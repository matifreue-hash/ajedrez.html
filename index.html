<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de Libros de Ajedrez</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    margin:10px;
}

.libro{
    background:#222;
    margin:20px auto;
    padding:20px;
    border-radius:10px;
    width:85%;
    text-align:left;
}

h2{
    color:gold;
}
</style>
</head>
<body>

<h1>Biblioteca de Ajedrez</h1>

<button onclick="generarLibros()">Comenzar</button>

<div id="resultado"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

const nombres = [
"Dominio Total del Medio Juego",
"Secretos de los Grandes Maestros",
"La Ciencia de la Estrategia",
"Patrones Tácticos Ganadores",
"El Arte del Ataque",
"Camino hacia la Maestría",
"Pensamiento Estratégico Avanzado",
"Manual de Combinaciones"
];

const frases = [
"Una buena posición vale más que una combinación brillante.",
"Los peones son el alma del ajedrez.",
"Cada jugada debe tener una idea.",
"La táctica nace de una posición superior.",
"Quien controla el centro controla la partida.",
"La paciencia convierte pequeñas ventajas en victorias.",
"El cálculo preciso supera la intuición.",
"La coordinación de piezas es poder."
];

const capitulos = [
`CAPÍTULO 1: CONTROL DEL CENTRO

El centro es la región más importante del tablero.
Las piezas colocadas en el centro tienen acceso a más casillas.
El dominio central permite cambiar rápidamente de flanco y crear amenazas constantes.`,

`CAPÍTULO 2: ACTIVIDAD DE PIEZAS

Una pieza activa tiene más valor que una pieza pasiva.
Siempre debes buscar mejorar tus piezas antes de iniciar operaciones tácticas.`,

`CAPÍTULO 3: PLANIFICACIÓN

Todo movimiento debe responder a un plan.
Los jugadores fuertes no juegan jugadas aisladas; construyen ideas a largo plazo.`,

`CAPÍTULO 4: TÁCTICAS

Las tácticas aparecen cuando las piezas están bien ubicadas.
Las clavadas, ataques dobles y sacrificios son herramientas fundamentales.`,

`CAPÍTULO 5: ATAQUE AL REY

Un ataque exitoso requiere coordinación.
Las piezas deben trabajar juntas para explotar debilidades.`,

`CAPÍTULO 6: FINALES

Los finales enseñan precisión.
Comprender la actividad del rey y la estructura de peones es esencial.`
];

const consejos = [
"Analiza partidas clásicas comentadas.",
"Resuelve ejercicios tácticos todos los días.",
"Juega partidas lentas para pensar más.",
"Revisa tus errores después de cada partida.",
"Estudia finales básicos antes de aperturas complejas.",
"Busca siempre mejorar tu peor pieza."
];

let librosGenerados = [];

function crearLibro() {

const nombre =
nombres[Math.floor(Math.random()*nombres.length)];

const frase =
frases[Math.floor(Math.random()*frases.length)];

const tipo =
Math.random()>0.5 ? "Táctica" : "Estrategia";

let contenido = "";

for(let i=0;i<4;i++){
contenido += capitulos[
Math.floor(Math.random()*capitulos.length)
] + "\n\n";
}

contenido +=
"\nCONSEJO PRINCIPAL:\n" +
consejos[Math.floor(Math.random()*consejos.length)] +
"\n\n";

contenido +=
"FRASE IMPORTANTE:\n" +
frase +
"\n\n";

contenido +=
"RESUMEN:\n" +
"El progreso en ajedrez se logra mediante estudio constante, análisis y práctica deliberada. Un jugador fuerte combina estrategia, táctica y comprensión de finales para tomar mejores decisiones durante toda la partida.";

return {
nombre,
tipo,
frase,
contenido
};
}

function generarLibros(){

librosGenerados=[];

while(librosGenerados.length<2){

let libro = crearLibro();

if(!librosGenerados.some(l=>l.nombre===libro.nombre)){
librosGenerados.push(libro);
}

}

mostrar();
}

function mostrar(){

const contenedor =
document.getElementById("resultado");

contenedor.innerHTML="";

librosGenerados.forEach((libro,index)=>{

contenedor.innerHTML += `
<div class="libro">
<h2>${libro.nombre}</h2>

<p><b>Tipo:</b> ${libro.tipo}</p>

<p><b>Frase importante:</b><br>
"${libro.frase}"
</p>

<pre style="white-space:pre-wrap;color:white;">
${libro.contenido}
</pre>

<button onclick="pdf(${index})">
Descargar PDF
</button>
</div>
`;

});

}

function pdf(index){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

const libro = librosGenerados[index];

doc.setFontSize(18);
doc.text(libro.nombre,10,15);

doc.setFontSize(12);

const texto =
doc.splitTextToSize(
"Tipo: " + libro.tipo +
"\n\nFrase importante: " +
libro.frase +
"\n\n" +
libro.contenido,
180
);

doc.text(texto,10,30);

doc.save(
libro.nombre.replace(/\s+/g,"_") + ".pdf"
);

}

</script>

</body>
</html>
