<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Libros de Ajedrez PDF</title>

<style>
  body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
  }

  button {
    padding: 12px 18px;
    margin: 10px;
    border: none;
    border-radius: 8px;
    background: #4caf50;
    color: white;
    cursor: pointer;
    font-size: 16px;
  }

  .box {
    background: #1e1e1e;
    padding: 20px;
    margin: 15px auto;
    width: 85%;
    border-radius: 10px;
    text-align: left;
  }

  h2 { color: #ffcc00; }
  h3 { color: #4caf50; }

  pre {
    white-space: pre-wrap;
    font-family: Arial;
    color: #ddd;
  }
</style>
</head>

<body>

<h1>Generador de Libros de Ajedrez (PDF Completo)</h1>

<button onclick="generar()">Comenzar</button>

<div id="contenedor"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

const libros = [
  {
    nombre: "Dominio Estratégico en Ajedrez",
    tipo: "Estrategia",
    contenido: `
INTRODUCCIÓN:
La estrategia en ajedrez es el arte de planificar a largo plazo.

CAPÍTULO 1: CONTROL DEL CENTRO
El centro del tablero es la zona más importante. Dominar e4, d4, e5 y d5 te da ventaja de movilidad.

CAPÍTULO 2: PIEZAS ACTIVAS
Una pieza activa vale más que una pieza pasiva. Siempre busca mejorar la posición de tus piezas.

CAPÍTULO 3: ESTRUCTURA DE PEONES
Los peones determinan la forma de la partida. Una mala estructura puede condenarte.

CAPÍTULO 4: PLANES
No juegues sin objetivo. Cada movimiento debe tener un propósito estratégico.

EJEMPLO:
Si controlas el centro, puedes atacar en ambos flancos con facilidad.

TIP DE ESTUDIO:
Analiza partidas lentas y pregúntate “¿por qué hizo esta jugada?”

RESUMEN:
La estrategia es paciencia, control y planificación.
`
  },

  {
    nombre: "Tácticas Profesionales de Ajedrez",
    tipo: "Táctica",
    contenido: `
INTRODUCCIÓN:
La táctica es la herramienta que decide partidas rápidamente.

CAPÍTULO 1: CLAVADAS
Una pieza queda inmóvil porque moverla pierde material.

CAPÍTULO 2: DOBLE ATAQUE
Una sola pieza ataca dos objetivos al mismo tiempo.

CAPÍTULO 3: SACRIFICIOS
A veces se entrega material para obtener jaque mate o ventaja decisiva.

CAPÍTULO 4: JAQUES FORZADOS
Movimientos que obligan al rival a responder de una sola forma.

EJEMPLO:
Un caballo en f7 puede destruir la defensa del rey si está mal protegido.

TIP DE ESTUDIO:
Resuelve puzzles diariamente sin mover piezas reales.

RESUMEN:
La táctica es cálculo, visión y reconocimiento de patrones.
`
  }
];

let seleccionados = [];

function generar() {
  seleccionados = [];

  while (seleccionados.length < 2) {
    let r = libros[Math.floor(Math.random() * libros.length)];
    if (!seleccionados.includes(r)) {
      seleccionados.push(r);
    }
  }

  mostrar();
}

function mostrar() {
  const contenedor = document.getElementById("contenedor");
  contenedor.innerHTML = "";

  seleccionados.forEach((libro, i) => {
    const div = document.createElement("div");
    div.className = "box";

    div.innerHTML = `
      <h2>${libro.nombre}</h2>
      <h3>Tipo: ${libro.tipo}</h3>
      <pre>${libro.contenido}</pre>
      <button onclick="descargarPDF(${i})">Descargar PDF</button>
    `;

    contenedor.appendChild(div);
  });
}

function descargarPDF(i) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let libro = seleccionados[i];

  doc.setFontSize(14);
  doc.text(libro.nombre, 10, 10);

  doc.setFontSize(11);

  let lines = doc.splitTextToSize(libro.contenido, 180);
  doc.text(lines, 10, 20);

  doc.save(libro.nombre + ".pdf");
}

</script>

</body>
</html>
