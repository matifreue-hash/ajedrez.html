<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro de Juegos</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    text-align:center;
}

#menuBtn{
    position:fixed;
    top:15px;
    left:15px;
    width:50px;
    height:50px;
    font-size:28px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#2563eb;
    color:white;
    z-index:1000;
}

#menu{
    position:fixed;
    top:0;
    left:-250px;
    width:250px;
    height:100%;
    background:#1e293b;
    transition:.3s;
    z-index:999;
    padding-top:80px;
}

#menu.abierto{
    left:0;
}

.opcion{
    padding:20px;
    font-size:22px;
    cursor:pointer;
    text-align:left;
    padding-left:30px;
}

.opcion:hover{
    background:#334155;
}

h1{
    margin-top:80px;
}

#tateti{
    padding:20px;
}

#tablero{
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:5px;
    justify-content:center;
    margin:20px auto;
}

.casilla{
    width:100px;
    height:100px;
    background:#334155;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    cursor:pointer;
    border-radius:10px;
}

#mensaje{
    margin-top:10px;
    font-size:22px;
}

#ajedrez{
    display:none;
    padding-top:80px;
}

#tableroAjedrez{
    width:480px;
    height:480px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(8,1fr);
}

.blanca{
    background:#f0d9b5;
}

.negra{
    background:#b58863;
}

.pieza{
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
}

.volver{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#ef4444;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<button id="menuBtn">☰</button>

<div id="menu">
    <div class="opcion" onclick="mostrarTateti()">
        🎮 Ta-Te-Ti
    </div>

    <div class="opcion" onclick="mostrarAjedrez()">
        ♟️ Ajedrez
    </div>
</div>

<div id="tateti">

<h1>Ta-Te-Ti</h1>

<div id="tablero"></div>

<div id="mensaje">Tu turno (X)</div>

</div>

<div id="ajedrez">

<h1>Ajedrez</h1>

<button class="volver" onclick="mostrarTateti()">
Volver al Ta-Te-Ti
</button>

<div id="tableroAjedrez"></div>

</div>

<script>
const menu = document.getElementById("menu");

document.getElementById("menuBtn").onclick = () => {
    menu.classList.toggle("abierto");
};

function mostrarAjedrez(){
    document.getElementById("tateti").style.display="none";
    document.getElementById("ajedrez").style.display="block";
    menu.classList.remove("abierto");
}

function mostrarTateti(){
    document.getElementById("ajedrez").style.display="none";
    document.getElementById("tateti").style.display="block";
    menu.classList.remove("abierto");
}

/* =========================
   TA-TE-TI
========================= */

const tableroDiv = document.getElementById("tablero");
const mensaje = document.getElementById("mensaje");

let tablero = ["","","","","","","","",""];
let activo = true;

const combinaciones = [
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

function crearTablero(){

    tableroDiv.innerHTML="";

    tablero.forEach((valor,i)=>{

        const c=document.createElement("div");
        c.className="casilla";
        c.textContent=valor;

        c.onclick=()=>jugar(i);

        tableroDiv.appendChild(c);
    });
}

function jugar(i){

    if(tablero[i]!=="" || !activo) return;

    tablero[i]="X";

    crearTablero();

    if(ganador("X")){
        mensaje.textContent="¡Ganaste!";
        activo=false;
        return;
    }

    if(tableroCompleto()){
        mensaje.textContent="Empate";
        return;
    }

    setTimeout(turnoIA,300);
}

function turnoIA(){

    let libres=[];

    tablero.forEach((v,i)=>{
        if(v==="") libres.push(i);
    });

    let mov=libres[Math.floor(Math.random()*libres.length)];

    tablero[mov]="O";

    crearTablero();

    if(ganador("O")){
        mensaje.textContent="La IA ganó";
        activo=false;
        return;
    }

    if(tableroCompleto()){
        mensaje.textContent="Empate";
    }
}

function ganador(j){

    return combinaciones.some(c=>
        c.every(i=>tablero[i]===j)
    );
}

function tableroCompleto(){
    return tablero.every(v=>v!=="");
}

crearTablero();

/* =========================
   AJEDREZ
========================= */

const tableroAjedrez =
document.getElementById("tableroAjedrez");

const piezas = [
"♜","♞","♝","♛","♚","♝","♞","♜",
"♟","♟","♟","♟","♟","♟","♟","♟",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"♙","♙","♙","♙","♙","♙","♙","♙",
"♖","♘","♗","♕","♔","♗","♘","♖"
];

for(let fila=0;fila<8;fila++){

    for(let col=0;col<8;col++){

        const casilla=document.createElement("div");

        casilla.className=
        (fila+col)%2===0
        ?"blanca pieza"
        :"negra pieza";

        casilla.textContent=
        piezas[fila*8+col];

        tableroAjedrez.appendChild(casilla);
    }
}
</script>

</body>
</html>
