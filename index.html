<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ta-Te-Ti vs IA</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    font-family:Arial, sans-serif;
    color:white;
}

h1{
    margin-bottom:20px;
}

#tablero{
    display:grid;
    grid-template-columns:repeat(3,120px);
    gap:8px;
}

.casilla{
    width:120px;
    height:120px;
    background:#334155;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:70px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.casilla:hover{
    background:#475569;
}

#mensaje{
    margin-top:20px;
    font-size:22px;
}

button{
    margin-top:15px;
    padding:10px 25px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
    background:#3b82f6;
    color:white;
}

button:hover{
    background:#2563eb;
}

.x{
    color:#38bdf8;
}

.o{
    color:#f43f5e;
}
</style>
</head>
<body>

<h1>🎮 Ta-Te-Ti vs IA</h1>

<div id="tablero"></div>

<div id="mensaje">Tu turno (X)</div>

<button onclick="reiniciar()">Reiniciar</button>

<script>
const tableroDiv = document.getElementById("tablero");
const mensaje = document.getElementById("mensaje");

let tablero = ["","","","","","","","",""];
let juegoActivo = true;

const jugador = "X";
const ia = "O";

const combinaciones = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
];

function crearTablero(){
    tableroDiv.innerHTML = "";

    tablero.forEach((valor,index)=>{
        const celda = document.createElement("div");
        celda.classList.add("casilla");
        celda.textContent = valor;
        if(valor==="X") celda.classList.add("x");
        if(valor==="O") celda.classList.add("o");

        celda.addEventListener("click",()=>jugadaJugador(index));
        tableroDiv.appendChild(celda);
    });
}

function jugadaJugador(index){
    if(!juegoActivo || tablero[index] !== "") return;

    tablero[index] = jugador;
    crearTablero();

    if(verificarGanador(tablero,jugador)){
        mensaje.textContent = "🏆 ¡Ganaste!";
        juegoActivo = false;
        return;
    }

    if(tableroCompleto()){
        mensaje.textContent = "🤝 Empate";
        juegoActivo = false;
        return;
    }

    mensaje.textContent = "🤖 Pensando...";

    setTimeout(()=>{
        movimientoIA();
    },400);
}

function movimientoIA(){
    let mejorMovimiento = minimax(tablero, ia).index;

    tablero[mejorMovimiento] = ia;

    crearTablero();

    if(verificarGanador(tablero, ia)){
        mensaje.textContent = "💀 La IA ganó";
        juegoActivo = false;
        return;
    }

    if(tableroCompleto()){
        mensaje.textContent = "🤝 Empate";
        juegoActivo = false;
        return;
    }

    mensaje.textContent = "Tu turno (X)";
}

function minimax(nuevoTablero, jugadorActual){

    const espacios = nuevoTablero
        .map((v,i)=>v===""?i:null)
        .filter(v=>v!==null);

    if(verificarGanador(nuevoTablero, jugador))
        return {score:-10};

    if(verificarGanador(nuevoTablero, ia))
        return {score:10};

    if(espacios.length===0)
        return {score:0};

    const movimientos = [];

    for(let i=0;i<espacios.length;i++){

        let movimiento = {};
        movimiento.index = espacios[i];

        nuevoTablero[espacios[i]] = jugadorActual;

        if(jugadorActual === ia){
            movimiento.score = minimax(nuevoTablero, jugador).score;
        }else{
            movimiento.score = minimax(nuevoTablero, ia).score;
        }

        nuevoTablero[espacios[i]] = "";

        movimientos.push(movimiento);
    }

    let mejorMovimiento;

    if(jugadorActual === ia){

        let mejorScore = -Infinity;

        for(let i=0;i<movimientos.length;i++){
            if(movimientos[i].score > mejorScore){
                mejorScore = movimientos[i].score;
                mejorMovimiento = i;
            }
        }

    }else{

        let mejorScore = Infinity;

        for(let i=0;i<movimientos.length;i++){
            if(movimientos[i].score < mejorScore){
                mejorScore = movimientos[i].score;
                mejorMovimiento = i;
            }
        }
    }

    return movimientos[mejorMovimiento];
}

function verificarGanador(tableroActual, jugadorActual){
    return combinaciones.some(comb =>
        comb.every(i => tableroActual[i] === jugadorActual)
    );
}

function tableroCompleto(){
    return tablero.every(c => c !== "");
}

function reiniciar(){
    tablero = ["","","","","","","","",""];
    juegoActivo = true;
    mensaje.textContent = "Tu turno (X)";
    crearTablero();
}

crearTablero();
</script>

</body>
</html>
